services:
  backend:
    build: ./backend
    ports:
      - "8888:8888"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    command: go run main.go

  database:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d

volumes:
  db_data: